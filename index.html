<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="7+7 Tracker" />
  <meta name="theme-color" content="#FF6B00" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-512.png" />
  <title>7+7 Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #F7F7F7; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    #root { max-width: 430px; margin: 0 auto; min-height: 100dvh; }
    #splash {
      position: fixed; inset: 0; background: #FF6B00;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      z-index: 9999; transition: opacity 0.5s;
    }
    #splash h1 { color: #fff; font-size: 40px; font-weight: 900; letter-spacing: -1px; }
    #splash p  { color: rgba(255,255,255,0.75); font-size: 13px; }
    .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="splash">
    <h1>7+7</h1>
    <div class="spinner"></div>
    <p>Cargando tracker...</p>
  </div>
  <div id="root"></div>
  <script>
    window.__hideSplash = function() {
      var s = document.getElementById('splash');
      if (s) { s.style.opacity = '0'; setTimeout(function(){ s.remove(); }, 500); }
    };
